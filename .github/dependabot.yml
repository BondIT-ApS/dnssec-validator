version: 2
updates:
  # Enable version updates for pip
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "21:12"
      timezone: "Europe/Copenhagen"
    open-pull-requests-limit: 10
    reviewers:
      - "MaBoNi"
    assignees:
      - "MaBoNi"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    groups:
      # Bundle patch + minor bumps into a single weekly PR per category.
      # Security advisories always come as separate PRs (Dependabot default).
      # Majors stay separate so they get a proper review.
      pip-production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      pip-development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # Enable version updates for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "21:12"
      timezone: "Europe/Copenhagen"
    open-pull-requests-limit: 10
    reviewers:
      - "MaBoNi"
    assignees:
      - "MaBoNi"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
